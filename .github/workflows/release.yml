name: Release Binary

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build Windows binary
        run: |
          python -m pip install -e .
          python -m PyInstaller --clean ccl.spec --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ccl-windows
          path: dist/ccl.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build Linux binary
        run: |
          python -m pip install -e .
          python -m PyInstaller --clean ccl.spec --noconfirm

      - name: Rename binary
        run: |
          mv dist/ccl dist/ccl-linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ccl-linux
          path: dist/ccl-linux

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build macOS binary
        run: |
          python -m pip install -e .
          python -m PyInstaller --clean ccl.spec --noconfirm

      - name: Rename binary
        run: |
          mv dist/ccl dist/ccl-macos

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ccl-macos
          path: dist/ccl-macos

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: ccl-*
          merge-multiple: false

      - name: List artifacts
        run: |
          ls -la artifacts/*

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/ccl-windows/ccl.exe
            artifacts/ccl-linux/ccl-linux
            artifacts/ccl-macos/ccl-macos
          draft: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
